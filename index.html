<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AC ELEKTRO PRO V3.8</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    
    <style>
        :root { --brand-green: #2ecc71; --brand-blue: #3498db; --dark: #2c3e50; }
        body { font-family: Arial, sans-serif; background: #f4f7f6; margin: 0; padding: 5px; display: flex; flex-direction: column; align-items: center; }
        
        /* Input Form Styling */
        .card { width: 100%; max-width: 500px; background: white; padding: 15px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 10px; box-sizing: border-box; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .full-width { grid-column: span 2; }
        label { font-size: 10px; font-weight: bold; color: #7f8c8d; }
        input, select { padding: 10px; border: 1px solid #ccc; border-radius: 5px; width: 100%; font-size: 14px; box-sizing: border-box; }
        
        .sig-container { margin: 10px 0; background: #fff; border: 1px dashed #999; height: 100px; }
        canvas { width: 100%; height: 100%; touch-action: none; }
        
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        button { padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; color: white; font-size: 14px; }
        .btn-save { background: var(--brand-green); }
        .btn-pdf { background: var(--brand-blue); }

        /* --- LIVE PREVIEW (සම්පූර්ණ පත්‍රිකාවේ පෙනුම) --- */
        .preview-wrapper { width: 100%; max-width: 100%; overflow-x: auto; background: #eee; padding: 10px; border-radius: 8px; box-sizing: border-box; }
        .live-preview-box { width: 210mm; background: white; padding: 15mm; box-shadow: 0 0 10px rgba(0,0,0,0.2); margin: 0 auto; color: black; }
        
        .form-title { font-size: 18px; font-weight: bold; border-bottom: 2px solid #000; margin-bottom: 15px; }
        .main-table { width: 100%; border-collapse: collapse; border: 1.5px solid black; }
        .main-table th, .main-table td { border: 1px solid black; padding: 3px; text-align: center; font-size: 11px; height: 18px; }
        .main-table th { background: #f2f2f2; }
        
        .summary-grid { display: flex; justify-content: space-between; margin-top: 15px; font-size: 12px; }
        .line-val { border-bottom: 1px solid black; min-width: 60px; display: inline-block; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="text-align:center; color:var(--brand-green); margin:0 0 10px 0; font-size: 18px;">AC ELEKTRO</h2>
    <div class="grid">
        <div class="full-width"><label>Name, Vorname</label><input type="text" id="name" oninput="renderForm()"></div>
        <div><label>Monat / Jahr</label><input type="month" id="month" onchange="renderForm()"></div>
        <div><label>Tag</label><input type="number" id="day" min="1" max="31"></div>
        <div><label>Beginn</label><input type="time" id="start" value="07:00"></div>
        <div><label>Ende</label><input type="time" id="end" value="16:00"></div>
        <div><label>Pause (Min)</label><input type="number" id="pause" value="45"></div>
        <div>
            <label>Kategorie</label>
            <select id="type">
                <option value="work">Arbeit</option>
                <option value="urlaub">Urlaub</option>
                <option value="feiertag">Feiertag</option>
                <option value="krank">Krank</option>
            </select>
        </div>
        <div class="full-width"><label>Einsatzort</label><input type="text" id="city" placeholder="Baustelle"></div>
    </div>
    <div class="sig-container"><canvas id="canvas"></canvas></div>
    <div class="btn-group">
        <button class="btn-save" onclick="saveData()">Speichern</button>
        <button class="btn-pdf" onclick="generatePDF()">PDF Erstellen</button>
    </div>
</div>

<div class="preview-wrapper">
    <div class="live-preview-box" id="capture-area">
        <div class="form-title">Zeiterfassung / Stundennachweis</div>
        <div style="font-size: 12px; margin-bottom: 10px;">
            Name, Vorname: <span id="view-name" class="line-val" style="min-width: 200px;"></span><br>
            Monat / Jahr: <span id="view-month" class="line-val" style="min-width: 100px; margin-top: 5px;"></span>
        </div>

        <table class="main-table">
            <thead>
                <tr>
                    <th width="30">Tag</th>
                    <th width="70">Beginn</th>
                    <th width="70">Ende</th>
                    <th width="60">Pausen</th>
                    <th width="80">Arbeits-stunden</th>
                    <th width="70">Überstd.</th>
                    <th>Einsatzort</th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>

        <div class="summary-grid">
            <div style="line-height: 1.8;">
                Arbeitsstunden <span class="line-val" id="sum-w"></span><br>
                Urlaub -Stunden- <span class="line-val" id="sum-u"></span><br>
                Feiertag -Stunden- <span class="line-val" id="sum-f"></span><br>
                Krank -Stunden- <span class="line-val" id="sum-k"></span><br>
                <strong>Stunden insgesamt <span class="line-val" id="sum-t"></span></strong>
            </div>
            <div style="text-align: center; width: 220px;">
                <p style="font-size: 9px; margin-bottom: 20px;">Nach 6h Arbeitszeit mind. 1/2h Pause</p>
                <div style="height: 50px; border-bottom: 1px solid black;"><img id="view-sig" style="max-height: 100%;"></div>
                <div style="font-size: 11px; margin-top: 5px;">Unterschrift Mitarbeiter</div>
            </div>
        </div>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('ace_v38_db')) || {};
    const canvas = document.getElementById("canvas");
    const pad = new SignaturePad(canvas);

    window.onload = () => {
        const now = new Date();
        document.getElementById('month').value = now.toISOString().substring(0, 7);
        renderForm();
        resizeCanvas();
    };

    function resizeCanvas() {
        const ratio = Math.max(window.devicePixelRatio || 1, 1);
        canvas.width = canvas.offsetWidth * ratio;
        canvas.height = canvas.offsetHeight * ratio;
        canvas.getContext("2d").scale(ratio, ratio);
    }

    function renderForm() {
        const m = document.getElementById('month').value;
        document.getElementById('view-name').innerText = document.getElementById('name').value;
        document.getElementById('view-month').innerText = m;
        
        const body = document.getElementById('table-body');
        body.innerHTML = "";
        let s = { w:0, u:0, f:0, k:0, ot:0 };
        const days = new Date(m.split('-')[0], m.split('-')[1], 0).getDate();

        for(let i=1; i<=31; i++) {
            const row = (i <= days) ? (db[`${m}-${i}`] || {}) : {};
            body.innerHTML += `<tr>
                <td>${i}</td>
                <td>${row.s || ''}</td>
                <td>${row.e || ''}</td>
                <td>${row.p ? row.p+'m' : ''}</td>
                <td style="font-weight:bold">${row.m ? (row.m/60).toFixed(2) : ''}</td>
                <td style="color:red">${row.ot ? (row.ot/60).toFixed(2) : ''}</td>
                <td>${row.c || ''}</td>
            </tr>`;
            if(row.m) {
                if(row.t === 'work') { s.w += row.m; s.ot += (row.ot || 0); }
                else if(row.t === 'urlaub') s.u += row.m;
                else if(row.t === 'feiertag') s.f += row.m;
                else if(row.t === 'krank') s.k += row.m;
            }
        }
        document.getElementById('sum-w').innerText = (s.w/60).toFixed(2);
        document.getElementById('sum-u').innerText = (s.u/60).toFixed(2);
        document.getElementById('sum-f').innerText = (s.f/60).toFixed(2);
        document.getElementById('sum-k').innerText = (s.k/60).toFixed(2);
        document.getElementById('sum-t').innerText = ((s.w+s.u+s.f+s.k)/60).toFixed(2);
    }

    function saveData() {
        const m = document.getElementById('month').value, d = document.getElementById('day').value;
        const sT = document.getElementById('start').value, eT = document.getElementById('end').value;
        const pM = parseInt(document.getElementById('pause').value) || 0;
        const type = document.getElementById('type').value, city = document.getElementById('city').value;

        if(!m || !d) return alert("Datum fehlt!");

        const [sh, sm] = sT.split(':').map(Number), [eh, em] = eT.split(':').map(Number);
        const diff = (eh * 60 + em) - (sh * 60 + sm);
        let net = diff - pM, ot = 0;

        if(type === 'work') {
            const dow = new Date(`${m}-${d}`).getDay();
            if(dow === 5 && diff > 300) ot = diff - 300; 
            else if(net > 510) ot = net - 510;
        }

        db[`${m}-${d}`] = { s:sT, e:eT, p:pM, m:net, ot, c:city, t:type };
        localStorage.setItem('ace_v38_db', JSON.stringify(db));
        renderForm();
        alert("Gespeichert!");
    }

    function generatePDF() {
        if(pad.isEmpty()) return alert("Unterschrift fehlt!");
        document.getElementById('view-sig').src = pad.toDataURL();
        
        const element = document.getElementById('capture-area');
        const opt = {
            margin: 0,
            filename: `Stundennachweis_${document.getElementById('month').value}.pdf`,
            html2canvas: { scale: 2 },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };
        html2pdf().set(opt).from(element).save();
    }
</script>
</body>
</html>
