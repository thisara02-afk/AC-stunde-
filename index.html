<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AC ELEKTRO - Zeiterfassung PRO V3.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root { --brand-green: #2ecc71; --brand-blue: #3498db; --ot-orange: #f39c12; --danger: #e74c3c; --dark: #2c3e50; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; color: var(--dark); }
        .card { width: 100%; max-width: 600px; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin-bottom: 20px; box-sizing: border-box; border-top: 5px solid var(--brand-green); }
        h2 { text-align: center; color: var(--brand-green); margin-top: 0; letter-spacing: 2px; text-transform: uppercase; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .full-width { grid-column: span 2; }
        label { font-size: 12px; font-weight: 700; color: #7f8c8d; text-transform: uppercase; margin-bottom: 5px; display: block; }
        input, select { padding: 12px; border: 1px solid #dcdde1; border-radius: 8px; width: 100%; font-size: 16px; transition: 0.3s; box-sizing: border-box; }
        input:focus { border-color: var(--brand-green); outline: none; box-shadow: 0 0 8px rgba(46, 204, 113, 0.2); }

        .chart-container { margin: 20px 0; height: 200px; width: 100%; }

        .sig-container { margin: 15px 0 5px 0; background: #f9f9f9; border: 2px dashed #bdc3c7; border-radius: 10px; height: 150px; position: relative; touch-action: none; }
        .sig-placeholder { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #bdc3c7; pointer-events: none; font-size: 14px; }
        canvas { width: 100%; height: 100%; cursor: crosshair; }
        
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        button { flex: 1; padding: 15px; border: none; border-radius: 10px; cursor: pointer; font-weight: 700; color: white; transition: 0.3s; font-size: 14px; }
        .btn-save { background: var(--brand-green); }
        .btn-pdf { background: var(--brand-blue); }
        .btn-backup { background: var(--dark); font-size: 12px; }
        .btn-clear { background: #95a5a6; padding: 8px; width: auto; flex: none; font-size: 11px; margin-bottom: 10px; }
        
        .dashboard { width: 100%; max-width: 800px; background: white; padding: 20px; border-radius: 15px; overflow-x: auto; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 600px; }
        th, td { border-bottom: 1px solid #ecf0f1; padding: 12px 8px; text-align: center; }
        th { background: #f8f9fa; color: #7f8c8d; }
        .ot-row { color: var(--ot-orange); font-weight: bold; }

        #backup-alert { display: none; background: #fff3cd; color: #856404; padding: 10px; border-radius: 8px; margin-bottom: 15px; font-size: 13px; text-align: center; border: 1px solid #ffeeba; font-weight: bold; }
    </style>
</head>
<body>

<div id="backup-alert">⚠️ ERINNERUNG: Bitte führen Sie ein Datensicherung (Backup) durch, um Datenverlust zu vermeiden!</div>

<div class="card">
    <h2>AC ELEKTRO <span style="font-size: 12px; vertical-align: middle; color: #888;">PRO V3.0</span></h2>
    
    <div class="grid">
        <div class="full-width">
            <label>Mitarbeiter Name & ID</label>
            <input type="text" id="emp_info" placeholder="Vorname Nachname - ID" oninput="updateView()">
        </div>
        <div>
            <label>Monat / Jahr</label>
            <input type="month" id="month" onchange="updateView()">
        </div>
        <div>
            <label>Tag (1-31)</label>
            <input type="number" id="day" min="1" max="31">
        </div>
        <div><label>Arbeitsbeginn</label><input type="time" id="start" value="07:00"></div>
        <div><label>Arbeitsende</label><input type="time" id="end" value="16:00"></div>
        <div>
            <label>Kategorie</label>
            <select id="type">
                <option value="work">Arbeit</option>
                <option value="urlaub">Urlaub</option>
                <option value="krank">Krankheit</option>
                <option value="feiertag">Feiertag</option>
            </select>
        </div>
        <div><label>Einsatzort / Projekt</label><input type="text" id="city" placeholder="Baustelle / Ort"></div>
    </div>

    <div class="sig-container">
        <div class="sig-placeholder" id="sig-label">Hier unterschreiben</div>
        <canvas id="canvas"></canvas>
    </div>
    <button class="btn-clear" onclick="pad.clear(); document.getElementById('sig-label').style.display='block';">Löschen</button>

    <div class="btn-group">
        <button class="btn-save" onclick="saveData()">Speichern</button>
        <button class="btn-pdf" onclick="generatePDF()">PDF Erstellen</button>
    </div>

    <div class="btn-group">
        <button class="btn-backup" onclick="exportJSON()">Backup Download</button>
        <button class="btn-backup" style="background:#1abc9c" onclick="document.getElementById('fileIn').click()">Daten Wiederherstellen</button>
        <input type="file" id="fileIn" style="display:none" onchange="importJSON(event)">
    </div>
</div>

<div class="card">
    <label>Wöchentliche Arbeitsstunden (Statistik)</label>
    <div class="chart-container">
        <canvas id="workChart"></canvas>
    </div>
</div>

<div class="dashboard">
    <h3 style="margin:0 0 15px 0;">Monatsübersicht</h3>
    <table>
        <thead>
            <tr>
                <th>Tag</th>
                <th>Zeitraum</th>
                <th>Pause (h)</th>
                <th>Netto (h)</th>
                <th>Überstd. (h)</th>
                <th>Einsatzort</th>
            </tr>
        </thead>
        <tbody id="table-body"></tbody>
    </table>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('ace_v3_db')) || {};
    const canvas = document.getElementById("canvas");
    const pad = new SignaturePad(canvas, { onBegin: () => document.getElementById('sig-label').style.display='none' });
    let workChart;

    window.onload = () => {
        setupCanvas();
        const now = new Date();
        document.getElementById('month').value = localStorage.getItem('ace_m') || now.toISOString().substring(0, 7);
        document.getElementById('emp_info').value = localStorage.getItem('ace_n') || '';
        document.getElementById('day').value = now.getDate();
        
        const lastB = localStorage.getItem('ace_last_b') || 0;
        if(Date.now() - lastB > 7 * 24 * 60 * 60 * 1000) {
            document.getElementById('backup-alert').style.display = 'block';
        }
        
        initChart();
        updateView();
    };

    function setupCanvas() {
        const ratio = Math.max(window.devicePixelRatio || 1, 1);
        canvas.width = canvas.offsetWidth * ratio;
        canvas.height = canvas.offsetHeight * ratio;
        canvas.getContext("2d").scale(ratio, ratio);
    }

    function initChart() {
        const ctx = document.getElementById('workChart').getContext('2d');
        workChart = new Chart(ctx, {
            type: 'bar',
            data: { labels: ['Woche 1', 'Woche 2', 'Woche 3', 'Woche 4', 'Woche 5'], datasets: [{ label: 'Arbeitsstunden', data: [0,0,0,0,0], backgroundColor: '#2ecc71' }] },
            options: { maintainAspectRatio: false, scales: { y: { beginAtZero: true } } }
        });
    }

    function updateView() {
        const m = document.getElementById('month').value;
        localStorage.setItem('ace_m', m);
        localStorage.setItem('ace_n', document.getElementById('emp_info').value);

        const body = document.getElementById('table-body');
        body.innerHTML = "";
        let weekData = [0,0,0,0,0];
        
        const days = new Date(m.split('-')[0], m.split('-')[1], 0).getDate();
        for(let i=1; i<=days; i++) {
            const row = db[`${m}-${i}`] || {s:'', e:'', p:0, m:0, ot:0, c:''};
            if(row.m > 0) {
                const weekIdx = Math.floor((i-1)/7);
                weekData[weekIdx] += (row.m/60);
            }
            body.innerHTML += `<tr><td>${i}</td><td>${row.s ? row.s + ' - ' + row.e : '-'}</td><td>${row.p > 0 ? (row.p/60).toFixed(2) : '-'}</td>
                               <td style="font-weight:bold">${row.m > 0 ? (row.m/60).toFixed(2) : '-'}</td>
                               <td class="ot-row">${row.ot > 0 ? (row.ot/60).toFixed(2) : '-'}</td><td>${row.c || '-'}</td></tr>`;
        }
        workChart.data.datasets[0].data = weekData;
        workChart.update();
    }

    function saveData() {
        const m = document.getElementById('month').value, d = document.getElementById('day').value;
        const sT = document.getElementById('start').value, eT = document.getElementById('end').value;
        const type = document.getElementById('type').value, city = document.getElementById('city').value;

        if(!m || !d) return alert("Bitte wählen Sie ein Datum aus!");
        if(type === 'work' && !city) return alert("Bitte geben Sie einen Einsatzort an!");

        const [sh, sm] = sT.split(':').map(Number), [eh, em] = eT.split(':').map(Number);
        const diff = (eh * 60 + em) - (sh * 60 + sm);
        if(diff <= 0) return alert("Fehler: Das Arbeitsende muss nach dem Arbeitsbeginn liegen!");

        let pause = 0, net = diff, ot = 0;
        const dateObj = new Date(`${m}-${d}`);
        const dayOfWeek = dateObj.getDay();

        if(type === 'work') {
            if(dayOfWeek === 5) { // FREITAG (Spezialregel: 07:00 - 12:00 = 5h/300min)
                if(diff > 300) ot = diff - 300;
            } else { // MO-DO & SA-SO
                if(diff > 540) pause = 45; else if(diff >= 360) pause = 30;
                net = diff - pause;
                if(net > 510) ot = net - 510; // 8.5h Regel
            }
        }
        db[`${m}-${d}`] = { s:sT, e:eT, p:pause, m:net, ot, c:city, t:type };
        localStorage.setItem('ace_v3_db', JSON.stringify(db));
        updateView();
        alert("Daten erfolgreich gespeichert!");
    }

    function exportJSON() {
        const data = JSON.stringify(db);
        const blob = new Blob([data], {type: "application/json"});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        const fileName = `AC_Backup_${document.getElementById('month').value}_${new Date().toLocaleDateString()}.json`;
        a.href = url; a.download = fileName;
        a.click();
        localStorage.setItem('ace_last_b', Date.now());
        document.getElementById('backup-alert').style.display = 'none';
    }

    function importJSON(e) {
        const reader = new FileReader();
        reader.onload = (event) => {
            try {
                const imported = JSON.parse(event.target.result);
                db = {...db, ...imported};
                localStorage.setItem('ace_v3_db', JSON.stringify(db));
                updateView();
                alert("Daten erfolgreich wiederhergestellt!");
            } catch (err) {
                alert("Fehler beim Importieren der Datei!");
            }
        };
        reader.readAsText(e.target.files[0]);
    }

    function generatePDF() {
        if(pad.isEmpty()) return alert("Bitte unterschreiben Sie zuerst!");
        
        const element = document.querySelector('.dashboard');
        const opt = {
            margin: 10,
            filename: `Stundennachweis_${document.getElementById('month').value}.pdf`,
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2 },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };
        
        html2pdf().set(opt).from(element).save();
    }
</script>

</body>
</html>
