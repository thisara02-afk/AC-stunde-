<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AC ELEKTRO - PRO V3.1</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root { --brand-green: #2ecc71; --brand-blue: #3498db; --ot-orange: #f39c12; --dark: #2c3e50; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f7f6; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; color: var(--dark); }
        .card { width: 100%; max-width: 600px; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin-bottom: 20px; box-sizing: border-box; border-top: 5px solid var(--brand-green); }
        h2 { text-align: center; color: var(--brand-green); margin-top: 0; text-transform: uppercase; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .full-width { grid-column: span 2; }
        label { font-size: 11px; font-weight: 700; color: #7f8c8d; text-transform: uppercase; margin-bottom: 5px; display: block; }
        input, select { padding: 12px; border: 1px solid #dcdde1; border-radius: 8px; width: 100%; font-size: 16px; box-sizing: border-box; }
        
        /* Highlight manual pause */
        .pause-box { background: #fff9e6; padding: 10px; border-radius: 8px; border: 1px solid #f1c40f; }

        .chart-container { margin: 20px 0; height: 180px; width: 100%; }
        .sig-container { margin: 15px 0 5px 0; background: #f9f9f9; border: 2px dashed #bdc3c7; border-radius: 10px; height: 140px; position: relative; touch-action: none; }
        .sig-placeholder { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #bdc3c7; pointer-events: none; font-size: 13px; }
        canvas { width: 100%; height: 100%; cursor: crosshair; }
        
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        button { flex: 1; padding: 14px; border: none; border-radius: 10px; cursor: pointer; font-weight: 700; color: white; font-size: 13px; }
        .btn-save { background: var(--brand-green); }
        .btn-pdf { background: var(--brand-blue); }
        .btn-backup { background: var(--dark); font-size: 11px; }
        .btn-clear { background: #95a5a6; padding: 8px; width: auto; flex: none; font-size: 10px; margin-bottom: 10px; }
        
        .dashboard { width: 100%; max-width: 800px; background: white; padding: 20px; border-radius: 15px; overflow-x: auto; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 600px; }
        th, td { border-bottom: 1px solid #ecf0f1; padding: 10px 5px; text-align: center; }
        th { background: #f8f9fa; color: #7f8c8d; }
    </style>
</head>
<body>

<div class="card">
    <h2>AC ELEKTRO PRO <span style="font-size: 12px; color: #888;">V3.1</span></h2>
    
    <div class="grid">
        <div class="full-width">
            <label>Mitarbeiter Name & ID</label>
            <input type="text" id="emp_info" placeholder="Max Mustermann - ID01" oninput="updateView()">
        </div>
        <div>
            <label>Monat / Jahr</label>
            <input type="month" id="month" onchange="updateView()">
        </div>
        <div>
            <label>Tag</label>
            <input type="number" id="day" min="1" max="31">
        </div>
        <div><label>Arbeitsbeginn</label><input type="time" id="start" value="07:00" onchange="calculateSuggestedPause()"></div>
        <div><label>Arbeitsende</label><input type="time" id="end" value="16:00" onchange="calculateSuggestedPause()"></div>
        
        <div class="pause-box">
            <label>Pause (Minuten)</label>
            <input type="number" id="pause_manual" value="45" placeholder="Minuten">
            <small style="font-size: 9px; color: #999;">*Gesetzlich: 30-45 Min.</small>
        </div>
        
        <div>
            <label>Kategorie</label>
            <select id="type">
                <option value="work">Arbeit</option>
                <option value="urlaub">Urlaub</option>
                <option value="krank">Krankheit</option>
                <option value="feiertag">Feiertag</option>
            </select>
        </div>
        <div class="full-width"><label>Einsatzort / Projekt</label><input type="text" id="city" placeholder="Baustelle / Ort"></div>
    </div>

    <div class="sig-container">
        <div class="sig-placeholder" id="sig-label">Hier unterschreiben</div>
        <canvas id="canvas"></canvas>
    </div>
    <button class="btn-clear" onclick="pad.clear(); document.getElementById('sig-label').style.display='block';">Löschen</button>

    <div class="btn-group">
        <button class="btn-save" onclick="saveData()">Speichern</button>
        <button class="btn-pdf" onclick="generatePDF()">PDF Erstellen</button>
    </div>

    <div class="btn-group">
        <button class="btn-backup" onclick="exportJSON()">Backup Download</button>
        <button class="btn-backup" style="background:#1abc9c" onclick="document.getElementById('fileIn').click()">Restore</button>
        <input type="file" id="fileIn" style="display:none" onchange="importJSON(event)">
    </div>
</div>

<div class="card">
    <label>Wochenstatistik (Arbeitsstunden)</label>
    <div class="chart-container"><canvas id="workChart"></canvas></div>
</div>

<div class="dashboard">
    <table id="main-table">
        <thead>
            <tr>
                <th>Tag</th>
                <th>Zeitraum</th>
                <th>Pause</th>
                <th>Netto (h)</th>
                <th>Überstd.</th>
                <th>Einsatzort</th>
            </tr>
        </thead>
        <tbody id="table-body"></tbody>
    </table>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('ace_v31_db')) || {};
    const canvas = document.getElementById("canvas");
    const pad = new SignaturePad(canvas, { onBegin: () => document.getElementById('sig-label').style.display='none' });
    let workChart;

    window.onload = () => {
        setupCanvas();
        const now = new Date();
        document.getElementById('month').value = localStorage.getItem('ace_m') || now.toISOString().substring(0, 7);
        document.getElementById('emp_info').value = localStorage.getItem('ace_n') || '';
        document.getElementById('day').value = now.getDate();
        initChart();
        updateView();
    };

    function setupCanvas() {
        const ratio = Math.max(window.devicePixelRatio || 1, 1);
        canvas.width = canvas.offsetWidth * ratio;
        canvas.height = canvas.offsetHeight * ratio;
        canvas.getContext("2d").scale(ratio, ratio);
    }

    function calculateSuggestedPause() {
        const sT = document.getElementById('start').value, eT = document.getElementById('end').value;
        const [sh, sm] = sT.split(':').map(Number), [eh, em] = eT.split(':').map(Number);
        const diff = (eh * 60 + em) - (sh * 60 + sm);
        let p = 0;
        if(diff > 540) p = 45; else if(diff >= 360) p = 30;
        document.getElementById('pause_manual').value = p;
    }

    function initChart() {
        const ctx = document.getElementById('workChart').getContext('2d');
        workChart = new Chart(ctx, {
            type: 'bar',
            data: { labels: ['W1', 'W2', 'W3', 'W4', 'W5'], datasets: [{ label: 'Stunden', data: [0,0,0,0,0], backgroundColor: '#2ecc71' }] },
            options: { maintainAspectRatio: false }
        });
    }

    function updateView() {
        const m = document.getElementById('month').value;
        localStorage.setItem('ace_m', m);
        localStorage.setItem('ace_n', document.getElementById('emp_info').value);
        const body = document.getElementById('table-body');
        body.innerHTML = "";
        let weekData = [0,0,0,0,0];
        const days = new Date(m.split('-')[0], m.split('-')[1], 0).getDate();
        
        for(let i=1; i<=days; i++) {
            const row = db[`${m}-${i}`] || {s:'', e:'', p:0, m:0, ot:0, c:''};
            if(row.m > 0) weekData[Math.floor((i-1)/7)] += (row.m/60);
            body.innerHTML += `<tr><td>${i}</td><td>${row.s ? row.s+' - '+row.e : '-'}</td><td>${row.p}m</td>
                               <td style="font-weight:bold">${row.m > 0 ? (row.m/60).toFixed(2) : '-'}</td>
                               <td style="color:#f39c12">${row.ot > 0 ? (row.ot/60).toFixed(2) : '-'}</td><td>${row.c || '-'}</td></tr>`;
        }
        workChart.data.datasets[0].data = weekData;
        workChart.update();
    }

    function saveData() {
        const m = document.getElementById('month').value, d = document.getElementById('day').value;
        const sT = document.getElementById('start').value, eT = document.getElementById('end').value;
        const pM = parseInt(document.getElementById('pause_manual').value) || 0;
        const type = document.getElementById('type').value, city = document.getElementById('city').value;

        if(!m || !d || (type==='work' && !city)) return alert("Bitte alle Felder ausfüllen!");

        const [sh, sm] = sT.split(':').map(Number), [eh, em] = eT.split(':').map(Number);
        const diff = (eh * 60 + em) - (sh * 60 + sm);
        if(diff <= 0) return alert("Zeitfehler!");

        let net = diff - pM, ot = 0;
        const dayOfWeek = new Date(`${m}-${d}`).getDay();

        if(type === 'work') {
            if(dayOfWeek === 5) { // Freitag
                if(diff > 300) ot = diff - 300;
            } else {
                if(net > 510) ot = net - 510;
            }
        }
        db[`${m}-${d}`] = { s:sT, e:eT, p:pM, m:net, ot, c:city, t:type };
        localStorage.setItem('ace_v31_db', JSON.stringify(db));
        updateView();
        alert("Gespeichert!");
    }

    function exportJSON() {
        const blob = new Blob([JSON.stringify(db)], {type: "application/json"});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `AC_Backup_${new Date().toLocaleDateString()}.json`;
        a.click();
    }

    function importJSON(e) {
        const reader = new FileReader();
        reader.onload = (ev) => {
            db = JSON.parse(ev.target.result);
            localStorage.setItem('ace_v31_db', JSON.stringify(db));
            updateView();
        };
        reader.readAsText(e.target.files[0]);
    }

    function generatePDF() {
        if(pad.isEmpty()) return alert("Bitte unterschreiben!");
        const element = document.querySelector('.dashboard');
        html2pdf().from(element).save(`Stundennachweis_${document.getElementById('month').value}.pdf`);
    }
</script>
</body>
</html>
