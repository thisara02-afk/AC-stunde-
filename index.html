<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stundennachweis</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, setDoc, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "XXXX",
  authDomain: "XXXX",
  projectId: "XXXX",
  storageBucket: "XXXX",
  messagingSenderId: "XXXX",
  appId: "XXXX"
};

const app = initializeApp(firebaseConfig);
window.dbCloud = getFirestore(app);
window.setDoc = setDoc;
window.getDoc = getDoc;
window.docRef = doc;
</script>

<style>
body { font-family: Arial; background:#f4f6f7; margin:0; padding:10px; }
.card { max-width:500px; margin:auto; background:white; padding:15px; border-radius:10px; }
input, select { width:100%; padding:10px; margin:5px 0; }
button { padding:12px; margin-top:5px; width:100%; border:none; color:white; font-weight:bold; }
.save { background:#27ae60; }
.pdf { background:#2980b9; }
.load { background:#8e44ad; }

table { width:100%; margin-top:20px; border-collapse:collapse; }
td, th { border:1px solid #ccc; padding:5px; font-size:12px; text-align:center; }

canvas { width:100%; height:120px; border:1px dashed #aaa; }
</style>
</head>

<body>

<div class="card">
<h2>Stundennachweis</h2>

<input id="name" placeholder="Name">
<input type="date" id="date">
<input type="time" id="start" value="07:00">
<input type="time" id="end" value="16:00">
<input type="number" id="pause" value="30">

<select id="type">
<option value="work">Arbeitstag</option>
<option value="urlaub">Urlaub</option>
<option value="feiertag">Feiertag</option>
<option value="krank">Krankheit</option>
</select>

<input id="note" placeholder="Bemerkung">

<canvas id="sig"></canvas>

<button class="save" onclick="saveData()">Speichern</button>
<button class="load" onclick="loadCloud()">Cloud Laden</button>
<button class="pdf" onclick="createPDF()">PDF Export</button>

</div>

<table id="table"></table>

<div id="pdf" style="display:none;">
<h2>Monatlicher Stundennachweis</h2>
<div id="pdfContent"></div>
</div>

<script>
let db = JSON.parse(localStorage.getItem("db")) || {};
const pad = new SignaturePad(document.getElementById("sig"));

function saveData() {
    const d = document.getElementById("date").value;
    const name = document.getElementById("name").value || "user";
    if(!d) return alert("Datum fehlt");

    const [y,m,day] = d.split("-");
    const s = document.getElementById("start").value;
    const e = document.getElementById("end").value;
    const p = parseInt(document.getElementById("pause").value)||0;
    const t = document.getElementById("type").value;
    const n = document.getElementById("note").value;

    let net=0, ot=0;

    if(t==="work"){
        const [sh,sm]=s.split(":").map(Number);
        const [eh,em]=e.split(":").map(Number);
        let diff=(eh*60+em)-(sh*60+sm);
        if(diff<=0) diff+=1440;
        net=diff-p;
        if(net>510){ ot=net-510; net=510;}
    } else {
        net=510;
    }

    db[d]={s,e,p,net,ot,t,n};
    localStorage.setItem("db",JSON.stringify(db));

    // CLOUD
    setDoc(docRef(dbCloud,"times",name+"_"+d),db[d]);

    render();
}

async function loadCloud(){
    const name=document.getElementById("name").value||"user";
    const d=document.getElementById("date").value;
    if(!d) return;

    const [y,m]=d.split("-");
    for(let i=1;i<=31;i++){
        let id=name+"_"+y+"-"+m+"-"+String(i).padStart(2,"0");
        let snap=await getDoc(docRef(dbCloud,"times",id));
        if(snap.exists()) db[id.split("_")[1]]=snap.data();
    }

    localStorage.setItem("db",JSON.stringify(db));
    render();
}

function render(){
    let html="<tr><th>Tag</th><th>Std</th><th>Typ</th></tr>";
    let sum={work:0,urlaub:0,feiertag:0,krank:0,ot:0};

    for(let d in db){
        let r=db[d];
        html+=`<tr><td>${d}</td><td>${(r.net/60).toFixed(2)}</td><td>${r.t}</td></tr>`;

        if(r.t==="work"){ sum.work+=r.net; sum.ot+=r.ot;}
        else sum[r.t]+=r.net;
    }

    document.getElementById("table").innerHTML=html;

    document.getElementById("pdfContent").innerHTML=`
    Arbeitsstunden: ${(sum.work/60).toFixed(2)}h<br>
    Urlaub: ${(sum.urlaub/60).toFixed(2)}h<br>
    Feiertag: ${(sum.feiertag/60).toFixed(2)}h<br>
    Krankheit: ${(sum.krank/60).toFixed(2)}h<br>
    Überstunden: ${(sum.ot/60).toFixed(2)}h
    `;
}

function createPDF(){
    if(pad.isEmpty()) return alert("Bitte unterschreiben");
    html2pdf().from(document.getElementById("pdf")).save();
}

render();
</script>

</body>
</html>
