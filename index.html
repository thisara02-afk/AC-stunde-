<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AC ELEKTRO PRO V5.4</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    
    <style>
        :root { --brand-green: #27ae60; --brand-blue: #2980b9; --danger: #e74c3c; --dark: #2c3e50; }
        body { font-family: 'Helvetica', Arial, sans-serif; background: #f0f2f5; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        
        .card { width: 100%; max-width: 500px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .full-width { grid-column: span 2; }
        
        label { font-size: 12px; font-weight: bold; color: var(--dark); display: block; margin-bottom: 5px; }
        input, select { padding: 12px; border: 1px solid #ccc; border-radius: 8px; width: 100%; font-size: 14px; box-sizing: border-box; }
        
        .sig-wrapper { position: relative; margin-top: 15px; border: 2px dashed #bdc3c7; border-radius: 8px; background: #fff; }
        .sig-container { height: 100px; }
        canvas { width: 100%; height: 100%; touch-action: none; }
        .btn-clear-sig { position: absolute; top: 5px; right: 5px; background: var(--danger); font-size: 10px; border: none; color: white; padding: 4px 8px; border-radius: 4px; }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        button { padding: 14px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 14px; }
        .btn-save { background: var(--brand-green); color: white; }
        .btn-pdf { background: var(--brand-blue); color: white; }
        .btn-reset { background: #7f8c8d; color: white; grid-column: span 2; margin-top: 5px; }

        .preview-wrapper { width: 100%; overflow-x: auto; }
        #capture-area { 
            width: 800px; min-height: 1120px; background: white; padding: 40px; margin: 0 auto; color: black; box-sizing: border-box; 
        }
        
        .form-header { border-bottom: 2px solid black; margin-bottom: 20px; padding-bottom: 10px; }
        .main-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        .main-table th, .main-table td { border: 1px solid black; padding: 6px; text-align: center; font-size: 11px; }
        .main-table th { background: #f2f2f2; }
        
        .summary-row { display: flex; justify-content: space-between; margin-top: 30px; font-size: 13px; }
        .line-val { border-bottom: 1px solid black; min-width: 60px; display: inline-block; text-align: center; font-weight: bold; }
        
        .signature-box { text-align: center; width: 250px; }
        .sig-line { border-bottom: 1.5px solid black; height: 70px; margin-bottom: 5px; display: flex; align-items: center; justify-content: center; }
        .sig-line img { max-height: 65px; }

        @media (max-width: 600px) {
            #capture-area { transform: scale(0.45); transform-origin: top left; margin-bottom: -600px; }
        }
    </style>
</head>
<body>

<div class="card">
    <h2 style="text-align:center; color:var(--brand-green); margin-top:0;">AC ELEKTRO PRO V5.4</h2>
    <div class="grid">
        <div class="full-width"><label>Name, Vorname</label><input type="text" id="name" oninput="renderForm()"></div>
        <div class="full-width"><label>Datum</label><input type="date" id="date-picker" onchange="renderForm()"></div>
        <div><label>Beginn</label><input type="time" id="start" value="07:00"></div>
        <div><label>Ende</label><input type="time" id="end" value="16:00"></div>
        <div><label>Pause (Min)</label><input type="number" id="pause" value="30"></div>
        <div>
            <label>Kategorie</label>
            <select id="type">
                <option value="work">Arbeitstag</option>
                <option value="urlaub">Urlaub</option>
                <option value="feiertag">Feiertag</option>
                <option value="krank">Krankheit</option>
            </select>
        </div>
        <div class="full-width"><label>Einsatzort / Bemerkung</label><input type="text" id="city"></div>
    </div>
    
    <div class="sig-wrapper">
        <div class="sig-container"><canvas id="canvas"></canvas></div>
        <button class="btn-clear-sig" onclick="pad.clear()">Löschen</button>
    </div>

    <div class="btn-group">
        <button class="btn-save" onclick="saveData()">Speichern</button>
        <button class="btn-pdf" onclick="generatePDF()">PDF Export</button>
        <button class="btn-reset" onclick="clearAllData()">Reset All</button>
    </div>
</div>

<div class="preview-wrapper">
    <div id="capture-area">
        <div class="form-header">
            <h1 style="font-size: 20px; margin:0;">MONATLICHER STUNDENNACHWEIS</h1>
        </div>
        
        <div style="font-size: 13px; margin-bottom: 15px; display: flex; gap: 30px;">
            <div><strong>Mitarbeiter:</strong> <span id="view-name" class="line-val" style="min-width: 250px;"></span></div>
            <div><strong>Monat / Jahr:</strong> <span id="view-month" class="line-val" style="min-width: 100px;"></span></div>
        </div>

        <table class="main-table">
            <thead>
                <tr>
                    <th>Tag</th>
                    <th>Wochentag</th>
                    <th>Beginn</th>
                    <th>Ende</th>
                    <th>Pause</th>
                    <th>Netto Std.</th>
                    <th>Überstd.</th>
                    <th>Einsatzort / Bemerkung</th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>

        <div class="summary-row">
            <div class="stats">
                Gesamt Arbeitsstunden: <span class="line-val" id="sum-w">0.00</span> h<br>
                Urlaub/Krank/Feiertag: <span class="line-val" id="sum-ukf">0.00</span> h<br>
                <strong>Überstunden Gesamt (+): <span class="line-val" id="sum-ot" style="color:red">0.00</span> h</strong><br>
                <hr style="border:0; border-top: 1.5px solid black; margin: 5px 0;">
                <strong style="font-size:15px;">SUMME GESAMT: <span class="line-val" id="sum-t">0.00</span> h</strong>
            </div>
            <div class="signature-box">
                <div class="sig-line"><img id="view-sig"></div>
                <div style="font-size: 11px;">Unterschrift des Mitarbeiters</div>
            </div>
        </div>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('ace_v54_db')) || {};
    const canvas = document.getElementById("canvas");
    const pad = new SignaturePad(canvas);

    window.onload = () => {
        const today = new Date();
        document.getElementById('date-picker').value = today.toISOString().split('T')[0];
        resizeCanvas();
        renderForm();
    };

    function resizeCanvas() {
        const ratio = Math.max(window.devicePixelRatio || 1, 1);
        canvas.width = canvas.offsetWidth * ratio;
        canvas.height = canvas.offsetHeight * ratio;
        canvas.getContext("2d").scale(ratio, ratio);
        pad.clear();
    }

    function renderForm() {
        const dateVal = document.getElementById('date-picker').value;
        if(!dateVal) return;
        const [year, month] = dateVal.split('-');
        const weekDays = ["So", "Mo", "Di", "Mi", "Do", "Fr", "Sa"];
        
        document.getElementById('view-name').innerText = document.getElementById('name').value;
        document.getElementById('view-month').innerText = `${month} / ${year}`;
        
        const body = document.getElementById('table-body');
        body.innerHTML = "";
        let s = { w:0, ot:0, extra:0 };
        const daysInMonth = new Date(year, month, 0).getDate();

        for(let i=1; i<=31; i++) {
            const rowKey = `${year}-${month}-${i}`;
            const dayDate = new Date(year, month-1, i);
            const dayIdx = dayDate.getDay();
            const isWeekend = (dayIdx === 0 || dayIdx === 6);
            
            const row = (i <= daysInMonth) ? (db[rowKey] || {}) : { disabled: true };
            let style = row.disabled ? 'background:#eee;' : (isWeekend ? 'background:#f9f9f9; color:#999;' : '');

            body.innerHTML += `<tr style="${style}">
                <td>${i}</td>
                <td>${i <= daysInMonth ? weekDays[dayIdx] : ''}</td>
                <td>${row.s || ''}</td>
                <td>${row.e || ''}</td>
                <td>${row.p ? row.p+'m' : ''}</td>
                <td style="font-weight:bold">${row.m ? (row.m/60).toFixed(2) : ''}</td>
                <td style="color:red; font-weight:bold">${row.ot ? (row.ot/60).toFixed(2) : ''}</td>
                <td style="font-size:10px; text-align:left;">${row.c || ''}</td>
            </tr>`;

            if(row.m) {
                if(row.t === 'work') { s.w += row.m; s.ot += (row.ot || 0); }
                else { s.extra += row.m; }
            }
        }
        document.getElementById('sum-w').innerText = (s.w/60).toFixed(2);
        document.getElementById('sum-ukf').innerText = (s.extra/60).toFixed(2);
        document.getElementById('sum-ot').innerText = (s.ot/60).toFixed(2);
        document.getElementById('sum-t').innerText = ((s.w + s.ot + s.extra)/60).toFixed(2);
    }

    function saveData() {
        const dateVal = document.getElementById('date-picker').value;
        if(!dateVal) return alert("Datum wählen!");
        const [y, m, d] = dateVal.split('-');
        const sT = document.getElementById('start').value, eT = document.getElementById('end').value;
        let pM = parseInt(document.getElementById('pause').value) || 0;
        const type = document.getElementById('type').value, city = document.getElementById('city').value;
        
        const dayOfWeek = new Date(y, m-1, d).getDay();
        let target = (dayOfWeek === 5) ? 300 : (dayOfWeek === 0 || dayOfWeek === 6 ? 0 : 510);

        let net = 0, ot = 0;
        if(type === 'work') {
            const [sh, sm] = sT.split(':').map(Number), [eh, em] = eT.split(':').map(Number);
            let diff = (eh * 60 + em) - (sh * 60 + sm);
            if(diff <= 0) diff += 1440; 
            
            // Gesetzliche Pause (ArbZG § 4)
            // > 6h: 30 Min | > 9h: 45 Min
            if(diff > 540) { // 9h
                if(pM < 45) pM = 45;
            } else if(diff > 360) { // 6h
                if(pM < 30) pM = 30;
            }

            let total = diff - pM;
            if(total > target) { net = target; ot = total - target; }
            else { net = total; ot = 0; }
        } else {
            net = (dayOfWeek === 0 || dayOfWeek === 6) ? 0 : target;
        }

        db[`${y}-${m}-${parseInt(d)}`] = { s:sT, e:eT, p:pM, m:net, ot, c:city, t:type };
        localStorage.setItem('ace_v54_db', JSON.stringify(db));
        renderForm();
        alert("Erfolgreich gespeichert!");
    }

    function clearAllData() {
        if(confirm("Möchten Sie wirklich alle Daten löschen?")) {
            localStorage.removeItem('ace_v54_db');
            db = {}; renderForm();
        }
    }

    function generatePDF() {
        if(pad.isEmpty()) return alert("Bitte unterschreiben!");
        document.getElementById('view-sig').src = pad.toDataURL();
        const element = document.getElementById('capture-area');
        const opt = {
            margin: 5,
            filename: `Stundennachweis_${document.getElementById('name').value || 'Unbekannt'}.pdf`,
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2, width: 800 },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };
        html2pdf().set(opt).from(element).save();
    }
</script>
</body>
</html>
