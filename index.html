<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AC ELEKTRO STUNDENNACHWEIS</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    
    <style>
        :root { --brand-green: #27ae60; --brand-blue: #2980b9; --danger: #e74c3c; --dark: #2c3e50; }
        body { font-family: 'Helvetica', Arial, sans-serif; background: #f4f7f6; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        
        /* Input Form UI */
        .card { width: 100%; max-width: 500px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); margin-bottom: 20px; box-sizing: border-box; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .full-width { grid-column: span 2; }
        label { font-size: 13px; font-weight: 600; display: block; margin-bottom: 4px; color: var(--dark); }
        input, select { padding: 12px; border: 1.5px solid #dcdde1; border-radius: 6px; width: 100%; font-size: 14px; box-sizing: border-box; }
        
        .sig-wrapper { position: relative; margin-top: 15px; border: 2px dashed #b2bec3; border-radius: 8px; background: #fff; }
        .sig-container { height: 130px; }
        canvas { width: 100%; height: 100%; touch-action: none; }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 15px; }
        button { padding: 14px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 14px; color: white; transition: 0.2s; }
        .btn-save { background: var(--brand-green); }
        .btn-pdf { background: var(--brand-blue); }
        .btn-reset { background: #7f8c8d; grid-column: span 2; margin-top: 5px; }

        /* PDF Layout Styling (Very Professional) */
        #pdf-container { position: absolute; left: -9999px; top: 0; }
        #pdf-page { width: 794px; background: white; padding: 50px; color: black; box-sizing: border-box; }
        .pdf-header { border-bottom: 2.5px solid black; margin-bottom: 20px; padding-bottom: 5px; }
        .pdf-header h1 { margin: 0; font-size: 24px; letter-spacing: 1px; }
        .pdf-meta-table { width: 100%; margin-bottom: 20px; font-size: 14px; }
        .pdf-meta-table td { padding: 5px 0; border: none; }
        .underline { border-bottom: 1px solid black; display: inline-block; min-width: 150px; padding-left: 10px; }

        .pdf-main-table { width: 100%; border-collapse: collapse; margin-bottom: 25px; }
        .pdf-main-table th, .pdf-main-table td { border: 1px solid black; padding: 4px; text-align: center; font-size: 11px; height: 20px; }
        .pdf-main-table th { background: #f0f0f0; }

        .pdf-footer { display: flex; justify-content: space-between; align-items: flex-start; margin-top: 20px; }
        .summary-box { font-size: 14px; line-height: 2; }
        .summary-box span { display: inline-block; min-width: 100px; border-bottom: 1px solid black; text-align: center; font-weight: bold; }
        
        .signature-area { width: 300px; text-align: center; margin-top: 30px; }
        .signature-line { border-top: 1.5px solid black; margin-top: 10px; padding-top: 5px; font-size: 12px; font-weight: bold; }
        #pdf-sig-img { max-height: 70px; margin-bottom: -10px; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="text-align:center; color:var(--brand-green); margin-top:0;">AC ELEKTRO</h2>
    <div class="grid">
        <div class="full-width"><label>Name, Vorname</label><input type="text" id="name" oninput="updateMonth()"></div>
        <div class="full-width"><label>Datum auswählen</label><input type="date" id="date-picker" onchange="updateMonth()"></div>
        <div><label>Beginn</label><input type="time" id="start" value="07:00"></div>
        <div><label>Ende</label><input type="time" id="end" value="16:00"></div>
        <div><label>Pause (Min)</label><input type="number" id="pause" value="30"></div>
        <div>
            <label>Kategorie</label>
            <select id="type">
                <option value="work">Arbeitstag</option>
                <option value="feiertag">Feiertag</option>
                <option value="urlaub">Urlaub</option>
                <option value="krank">Krankheit</option>
            </select>
        </div>
        <div class="full-width"><label>Bemerkung / Einsatzort</label><input type="text" id="city"></div>
    </div>
    
    <div class="sig-wrapper">
        <div class="sig-container"><canvas id="canvas"></canvas></div>
        <button style="position:absolute; top:5px; right:5px; background:var(--danger); border-radius:4px; padding:3px 7px; font-size:10px; color:white; border:none;" onclick="pad.clear()">Löschen</button>
    </div>

    <div class="btn-group">
        <button class="btn-save" onclick="saveData()">SPEICHERN</button>
        <button class="btn-pdf" onclick="generatePDF()">PDF EXPORT</button>
        <button class="btn-reset" onclick="resetData()">DATEN LÖSCHEN</button>
    </div>
</div>

<div id="pdf-container">
    <div id="pdf-page">
        <div class="pdf-header">
            <h1>MONATLICHER STUNDENNACHWEIS</h1>
        </div>
        
        <table class="pdf-meta-table">
            <tr>
                <td>Mitarbeiter: <span class="underline" id="pdf-name-out"></span></td>
                <td style="text-align: right;">Monat / Jahr: <span class="underline" id="pdf-month-out"></span></td>
            </tr>
        </table>

        <table class="pdf-main-table">
            <thead>
                <tr>
                    <th width="30">Tag</th><th width="40">Tag</th><th width="80">Beginn</th><th width="80">Ende</th>
                    <th width="60">Pause</th><th width="70">Netto Std.</th><th width="70">Überstd.</th><th>Einsatzort / Bemerkung</th>
                </tr>
            </thead>
            <tbody id="pdf-table-body">
                </tbody>
        </table>

        <div class="pdf-footer">
            <div class="summary-box">
                Gesamt Arbeitsstunden: <span id="sum-work">0.00</span> h<br>
                Urlaub / Krank / Feiertag: <span id="sum-other">0.00</span> h<br>
                Überstunden (+): <span id="sum-over" style="color:red; border-bottom:1px solid red;">0.00</span> h<br>
                <strong style="font-size:16px;">GESAMTSUMME: <span id="sum-total">0.00</span> h</strong>
            </div>
            
            <div class="signature-area">
                <img id="pdf-sig-img" src="">
                <div class="signature-line">Unterschrift des Mitarbeiters</div>
            </div>
        </div>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('ace_v17_db')) || {};
    const canvas = document.querySelector("canvas");
    const pad = new SignaturePad(canvas);

    window.onload = () => {
        const today = new Date();
        document.getElementById('date-picker').value = today.toISOString().split('T')[0];
        resizeCanvas();
        updateMonth();
    };

    function resizeCanvas() {
        const ratio = Math.max(window.devicePixelRatio || 1, 1);
        canvas.width = canvas.offsetWidth * ratio;
        canvas.height = canvas.offsetHeight * ratio;
        canvas.getContext("2d").scale(ratio, ratio);
    }

    function updateMonth() {
        const dateVal = document.getElementById('date-picker').value;
        if(!dateVal) return;
        const [y, m] = dateVal.split('-');
        const weekDays = ["So", "Mo", "Di", "Mi", "Do", "Fr", "Sa"];
        const daysInMonth = new Date(y, m, 0).getDate();
        
        document.getElementById('pdf-name-out').innerText = document.getElementById('name').value || "..................";
        document.getElementById('pdf-month-out').innerText = `${m} / ${y}`;

        const body = document.getElementById('pdf-table-body');
        body.innerHTML = "";
        
        let sWork = 0, sOver = 0, sOther = 0;

        for(let i=1; i<=31; i++) {
            const key = `${y}-${m}-${i}`;
            const dObj = new Date(y, m-1, i);
            const dName = (i <= daysInMonth) ? weekDays[dObj.getDay()] : "";
            const row = (i <= daysInMonth) ? (db[key] || {}) : { empty: true };

            let rowStyle = "";
            if(dName === "Sa" || dName === "So") rowStyle = 'background:#f2f2f2; color:#777;';
            if(row.t && row.t !== 'work') rowStyle = 'background:#fff9c4; font-weight:bold;';

            body.innerHTML += `<tr style="${rowStyle}">
                <td>${i}</td><td>${dName}</td>
                <td>${row.s || ''}</td><td>${row.e || ''}</td>
                <td>${row.p ? row.p+'m' : ''}</td>
                <td>${row.m ? (row.m/60).toFixed(2) : ''}</td>
                <td style="color:red;">${row.ot ? (row.ot/60).toFixed(2) : ''}</td>
                <td style="text-align:left; padding-left:10px;">${row.c || ''}</td>
            </tr>`;

            if(row.m) {
                if(row.t === 'work') { sWork += row.m; sOver += (row.ot || 0); }
                else { sOther += row.m; }
            }
        }

        document.getElementById('sum-work').innerText = (sWork/60).toFixed(2);
        document.getElementById('sum-over').innerText = (sOver/60).toFixed(2);
        document.getElementById('sum-other').innerText = (sOther/60).toFixed(2);
        document.getElementById('sum-total').innerText = ((sWork + sOver + sOther)/60).toFixed(2);
    }

    function saveData() {
        const dVal = document.getElementById('date-picker').value;
        const [y, m, d] = dVal.split('-');
        const s = document.getElementById('start').value, e = document.getElementById('end').value;
        const p = parseInt(document.getElementById('pause').value) || 0;
        const type = document.getElementById('type').value, city = document.getElementById('city').value;
        const dayIdx = new Date(y, m-1, d).getDay();

        let target = (dayIdx === 5) ? 300 : (dayIdx === 0 || dayIdx === 6 ? 0 : 510);
        let net = 0, ot = 0;

        if(type === 'work') {
            const [sh, sm] = s.split(':').map(Number), [eh, em] = e.split(':').map(Number);
            let total = (eh * 60 + em) - (sh * 60 + sm) - p;
            if(total > target) { net = target; ot = total - target; } else { net = total; ot = 0; }
        } else { net = (dayIdx === 0 || dayIdx === 6) ? 0 : target; }

        db[`${y}-${m}-${parseInt(d)}`] = { s, e, p, m:net, ot, c:city, t:type };
        localStorage.setItem('ace_v17_db', JSON.stringify(db));
        updateMonth();
        alert("Daten gespeichert!");
    }

    function resetData() { if(confirm("Alle Daten löschen?")) { localStorage.removeItem('ace_v17_db'); db={}; updateMonth(); } }

    async function generatePDF() {
        if(pad.isEmpty()) return alert("Bitte unterschreiben!");
        document.getElementById('pdf-sig-img').src = pad.toDataURL();
        
        const element = document.getElementById('pdf-page');
        const opt = {
            margin: 0,
            filename: `Stundennachweis_${document.getElementById('name').value}.pdf`,
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2, useCORS: true },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };
        
        setTimeout(() => { html2pdf().set(opt).from(element).save(); }, 500);
    }
</script>
</body>
</html>
