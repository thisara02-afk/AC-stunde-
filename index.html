<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AC ELEKTRO ZEITERFASSUNG</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    
    <style>
        :root { --brand: #2c3e50; --green: #27ae60; --blue: #2980b9; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', Helvetica, Arial, sans-serif; background: var(--bg); margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        
        .card { width: 100%; max-width: 500px; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.08); box-sizing: border-box; }
        h2 { text-align: center; color: var(--green); margin-bottom: 15px; font-size: 20px; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .full { grid-column: span 2; }
        label { font-size: 12px; font-weight: 600; display: block; margin-bottom: 3px; color: #34495e; }
        input, select { padding: 10px; border: 1px solid #dfe6e9; border-radius: 6px; width: 100%; font-size: 14px; box-sizing: border-box; }
        
        .summary-box { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-top: 15px; padding: 10px; background: #fffde7; border-radius: 8px; border: 1px solid #fbc02d; }
        .sum-item { font-size: 10px; text-align: center; color: #7f8c8d; }
        .sum-item b { font-size: 13px; color: var(--brand); display: block; }

        .sig-wrapper { border: 2px dashed #bdc3c7; border-radius: 8px; margin-top: 15px; position: relative; background: #fff; height: 120px; }
        canvas { width: 100%; height: 100%; touch-action: none; }
        
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        button { padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; color: white; font-size: 13px; }
        .btn-save { background: var(--green); }
        .btn-pdf { background: var(--blue); }
        .btn-reset { background: #95a5a6; grid-column: span 2; margin-top: 5px; }

        /* PDF DESIGN - OPTIMIERT FÜR EINE SEITE */
        #pdf-render { width: 190mm; background: white; padding: 10mm; color: black; display: none; position: absolute; left: 0; top: 0; }
        .pdf-header { border-bottom: 2px solid black; margin-bottom: 8px; }
        .pdf-header h3 { margin: 0; font-size: 16px; }
        .pdf-table { width: 100%; border-collapse: collapse; margin-top: 5px; }
        .pdf-table th, .pdf-table td { border: 1px solid black; padding: 3px; font-size: 9px; text-align: center; line-height: 1.1; }
        .pdf-table th { background: #f0f0f0; }
        .pdf-footer { display: flex; justify-content: space-between; align-items: flex-end; margin-top: 15px; }
        .pdf-sums-list { font-size: 10px; line-height: 1.4; width: 50%; }
        .pdf-sums-list div { display: flex; justify-content: space-between; border-bottom: 0.5px solid #eee; padding: 1px 0; }
        .pdf-sig-box { text-align: center; width: 180px; }
    </style>
</head>
<body>

<div class="card">
    <h2>AC ELEKTRO</h2>
    <div class="grid">
        <div class="full"><label>Name, Vorname</label><input type="text" id="in-name" placeholder="Eingeben..."></div>
        <div class="full"><label>Datum</label><input type="date" id="in-date"></div>
        <div><label>Beginn</label><input type="time" id="in-start" value="07:00"></div>
        <div><label>Ende</label><input type="time" id="in-end" value="16:00"></div>
        <div><label>Pause (Min)</label><input type="number" id="in-pause" value="30"></div>
        <div>
            <label>Kategorie</label>
            <select id="in-type">
                <option value="work">Arbeitstag</option>
                <option value="urlaub">Urlaub</option>
                <option value="krank">Krankheit</option>
                <option value="feiertag">Feiertag</option>
            </select>
        </div>
        <div class="full"><label>Einsatzort / Bemerkung</label><input type="text" id="in-city"></div>
    </div>
    
    <div class="summary-box">
        <div class="sum-item">Arbeit<br><b id="st-w">0.00</b></div>
        <div class="sum-item">Urlaub/Krank<br><b id="st-off">0.00</b></div>
        <div class="sum-item">Gesamt<br><b id="st-total">0.00</b></div>
    </div>

    <div class="sig-wrapper">
        <canvas id="sig-pad"></canvas>
        <button style="position:absolute; top:5px; right:5px; background:#e74c3c; padding:3px 8px; font-size:10px; border:none; border-radius:4px; color:white;" onclick="pad.clear()">Leeren</button>
    </div>

    <div class="btn-group">
        <button class="btn-save" onclick="saveData()">SPEICHERN</button>
        <button class="btn-pdf" onclick="exportPDF()">PDF EXPORT</button>
        <button class="btn-reset" onclick="resetAll()">DATEN LÖSCHEN</button>
    </div>
</div>

<div id="pdf-render">
    <div class="pdf-header"><h3>ZEITERFASSUNG / STUNDENNACHWEIS</h3></div>
    <div style="display:flex; justify-content:space-between; margin-bottom:8px; font-size:11px;">
        <span>Mitarbeiter: <b id="p-name"></b></span>
        <span>Monat / Jahr: <b id="p-month"></b></span>
    </div>
    <table class="pdf-table">
        <thead>
            <tr><th>Tag</th><th>Tag</th><th>Beginn</th><th>Ende</th><th>Pause</th><th>Netto</th><th>Überst.</th><th>Einsatzort</th></tr>
        </thead>
        <tbody id="p-body"></tbody>
    </table>
    <div class="pdf-footer">
        <div class="pdf-sums-list">
            <div>Arbeitsstunden: <span id="ps-w">0.00</span> h</div>
            <div>Überstunden (+): <span id="ps-ot">0.00</span> h</div>
            <div>Urlaub / Krank / Feiertag: <span id="ps-off">0.00</span> h</div>
            <div style="border-top:1px solid black; font-weight:bold; margin-top:2px;">Stunden insgesamt: <span id="ps-total">0.00</span> h</div>
        </div>
        <div class="pdf-sig-box">
            <img id="p-sig" style="max-height:50px; min-width:100px;"><br>
            <div style="border-top: 1px solid black; padding-top:3px; font-weight:bold; font-size:9px;">Unterschrift Mitarbeiter</div>
        </div>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('ace_v18_db')) || {};
    const canvas = document.getElementById("sig-pad");
    const pad = new SignaturePad(canvas);

    function resizeCanvas() {
        const ratio = Math.max(window.devicePixelRatio || 1, 1);
        canvas.width = canvas.offsetWidth * ratio;
        canvas.height = canvas.offsetHeight * ratio;
        canvas.getContext("2d").scale(ratio, ratio);
    }
    window.onload = () => { resizeCanvas(); updateUI(); };

    function updateUI() {
        const dVal = document.getElementById('in-date').value || new Date().toISOString().split('T')[0];
        const [y, m] = dVal.split('-');
        const lastDay = new Date(y, m, 0).getDate();
        document.getElementById('p-name').innerText = document.getElementById('in-name').value || "________________";
        document.getElementById('p-month').innerText = `${m} / ${y}`;

        let w=0, ot=0, off=0;
        const pb = document.getElementById('p-body');
        pb.innerHTML = "";
        const days = ["So", "Mo", "Di", "Mi", "Do", "Fr", "Sa"];

        for(let i=1; i<=lastDay; i++) {
            const dateStr = `${y}-${m}-${String(i).padStart(2, '0')}`;
            const row = db[`${y}-${m}-${i}`] || {};
            const dName = days[new Date(dateStr).getDay()];
            pb.innerHTML += `<tr>
                <td>${i}</td><td>${dName}</td>
                <td>${row.s || ''}</td><td>${row.e || ''}</td>
                <td>${row.p ? row.p+'m' : ''}</td>
                <td>${row.h ? row.h.toFixed(2) : ''}</td>
                <td style="color:red;">${row.ot > 0 ? row.ot.toFixed(2) : ''}</td>
                <td>${row.c || ''}</td>
            </tr>`;
            if(row.h) {
                if(row.t==='work') { w += row.h; ot += (row.ot || 0); }
                else { off += row.h; }
            }
        }
        const total = w + ot + off;
        document.getElementById('st-w').innerText = document.getElementById('ps-w').innerText = w.toFixed(2);
        document.getElementById('st-off').innerText = document.getElementById('ps-off').innerText = off.toFixed(2);
        document.getElementById('st-total').innerText = document.getElementById('ps-total').innerText = total.toFixed(2);
        document.getElementById('ps-ot').innerText = ot.toFixed(2);
    }

    function saveData() {
        const dStr = document.getElementById('in-date').value;
        if(!dStr) return alert("Datum wählen!");
        const [y, m, day] = dStr.split('-');
        const dayOfWeek = new Date(dStr).getDay();
        const s = document.getElementById('in-start').value, e = document.getElementById('in-end').value;
        const p = parseInt(document.getElementById('in-pause').value) || 0;
        const t = document.getElementById('in-type').value;
        const c = document.getElementById('in-city').value;
        
        let h = 0, ot = 0;
        if(t === 'work') {
            const [sh, sm] = s.split(':').map(Number), [eh, em] = e.split(':').map(Number);
            let diff = ((eh * 60 + em) - (sh * 60 + sm) - p) / 60;
            let limit = (dayOfWeek === 5) ? 5.0 : 8.5; 
            if(diff > limit) { h = limit; ot = diff - limit; } else { h = diff; }
        } else { h = (dayOfWeek === 5) ? 5.0 : 8.5; }

        db[`${y}-${m}-${parseInt(day)}`] = { s, e, p, h, ot, c, t };
        localStorage.setItem('ace_v18_db', JSON.stringify(db));
        updateUI();
        alert("Gespeichert!");
    }

    function exportPDF() {
        if(pad.isEmpty()) return alert("Unterschrift fehlt!");
        const element = document.getElementById('pdf-render');
        document.getElementById('p-sig').src = pad.toDataURL();
        element.style.display = 'block';
        
        const opt = {
            margin: [5, 5, 5, 5],
            filename: 'Stundennachweis.pdf',
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2, useCORS: true },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };

        html2pdf().set(opt).from(element).save().then(() => {
            element.style.display = 'none';
        });
    }

    function resetAll() { if(confirm("Alle Daten löschen?")) { localStorage.removeItem('ace_v18_db'); db={}; updateUI(); } }
</script>
</body>
</html>
