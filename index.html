<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AC Elektro Stundennachweis</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --green: #4db34d; --blue: #0d6efd; --bg: #f0f2f5; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        
        /* App Interface Styling */
        .app-container { width: 100%; max-width: 500px; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); box-sizing: border-box; }
        h2 { text-align: center; color: #333; margin-top: 0; font-size: 20px; }
        
        .input-group { margin-bottom: 12px; }
        label { font-size: 12px; font-weight: bold; color: #666; display: block; margin-bottom: 4px; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; -webkit-appearance: none; }
        
        .row { display: flex; gap: 10px; }
        .row > div { flex: 1; }

        .btn-add { background: var(--green); color: white; width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; margin-top: 10px; cursor: pointer; }
        .btn-pdf { background: var(--blue); color: white; width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; margin-top: 10px; cursor: pointer; }
        .btn-reset { background: #ff4d4d; color: white; width: 100%; padding: 10px; border: none; border-radius: 8px; font-weight: bold; font-size: 14px; margin-top: 10px; cursor: pointer; opacity: 0.8; }

        .dev-tag { font-size: 10px; color: #bbb; text-align: center; margin-top: 15px; font-style: italic; }

        /* මේක තමයි රහස - PDF එක ඇප් එක ඇතුළේ හංගනවා */
        #printable-area { 
            position: absolute; 
            left: -9999px; 
            top: 0; 
            width: 210mm; 
            background: white; 
            padding: 15mm; 
            color: black; 
        }

        /* PDF Table Styling */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #000; padding: 8px; text-align: center; font-size: 12px; }
        th { background: #eee; }
    </style>
</head>
<body>

    <div class="app-container no-print">
        <h2>AC Elektro</h2>
        
        <div class="input-group">
            <label>Name, Vorname</label>
            <input type="text" id="workerName" placeholder="ඔබේ නම">
        </div>

        <div class="row">
            <div class="input-group">
                <label>Datum</label>
                <input type="date" id="date">
            </div>
            <div class="input-group">
                <label>Einsatzort</label>
                <input type="text" id="location" placeholder="වැඩබිම">
            </div>
        </div>

        <div class="row">
            <div class="input-group">
                <label>Beginn</label>
                <input type="time" id="start" value="07:00">
            </div>
            <div class="input-group">
                <label>Ende</label>
                <input type="time" id="end" value="16:00">
            </div>
        </div>

        <div class="input-group">
            <label>Pause (Minuten)</label>
            <input type="number" id="pause" value="30">
        </div>

        <button class="btn-add" onclick="addRow()">➕ Hinzufügen (ඇතුළත් කරන්න)</button>
        <button class="btn-pdf" onclick="generatePDF()">📥 PDF Herunterladen (ඩවුන්ලෝඩ්)</button>
        <button class="btn-reset" onclick="location.reload()">🔄 Reset (මකන්න)</button>
        
        <div class="dev-tag">Developed by Thisara</div>
    </div>

    <div id="printable-area">
        <div style="display:flex; justify-content:space-between; border-bottom:2px solid #000; padding-bottom:10px;">
            <h1 style="text-decoration:underline;">Stundennachweis</h1>
            <h2 style="color:#4db34d;">AC ELEKTRO</h2>
        </div>
        <p>Name: <b id="pdfNameDisplay">________________</b></p>
        <table id="pdfTable">
            <thead>
                <tr>
                    <th>Datum</th>
                    <th>Beginn</th>
                    <th>Ende</th>
                    <th>Pause</th>
                    <th>Arbeitsstunden</th>
                    <th>Einsatzort</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
        <div style="margin-top:20px; display:flex; justify-content:space-between;">
            <p>Total Stunden: <b id="totalDisplay">0:00</b></p>
            <p>___________________<br>Unterschrift</p>
        </div>
    </div>

    <script>
        let totalMinutes = 0;

        function addRow() {
            const date = document.getElementById('date').value;
            const start = document.getElementById('start').value;
            const end = document.getElementById('end').value;
            const pause = parseInt(document.getElementById('pause').value) || 0;
            const loc = document.getElementById('location').value;
            const name = document.getElementById('workerName').value;

            if(!date) { alert("දිනය ඇතුළත් කරන්න"); return; }
            document.getElementById('pdfNameDisplay').innerText = name || "________________";

            const s = start.split(':');
            const e = end.split(':');
            const diff = (parseInt(e[0])*60 + parseInt(e[1])) - (parseInt(s[0])*60 + parseInt(s[1])) - pause;

            if(diff < 0) { alert("කරුණාකර වේලාව පරීක්ෂා කරන්න"); return; }

            totalMinutes += diff;
            const hrs = Math.floor(diff/60);
            const mins = diff%60;
            const timeStr = `${hrs}:${mins.toString().padStart(2,'0')}`;

            const tbody = document.getElementById('pdfTable').tBodies[0];
            const row = tbody.insertRow();
            row.innerHTML = `<td>${date}</td><td>${start}</td><td>${end}</td><td>${pause}m</td><td>${timeStr}</td><td>${loc}</td>`;

            const th = Math.floor(totalMinutes/60);
            const tm = totalMinutes%60;
            document.getElementById('totalDisplay').innerText = `${th}:${tm.toString().padStart(2,'0')}`;
            
            alert("දත්ත ඇතුළත් විය!");
        }

        function generatePDF() {
            const element = document.getElementById('printable-area');
            const name = document.getElementById('workerName').value || "Timesheet";
            html2pdf().from(element).set({
                margin: 10,
                filename: `${name}.pdf`,
                html2canvas: { scale: 2 },
                jsPDF: { orientation: 'portrait' }
            }).save();
        }
    </script>
</body>
</html>
