<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AC ELEKTRO - PRO V3.4</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    
    <style>
        :root { --brand-green: #2ecc71; --brand-blue: #3498db; --dark: #2c3e50; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        
        /* UI Styling */
        .card { width: 100%; max-width: 500px; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); margin-bottom: 15px; box-sizing: border-box; border-top: 5px solid var(--brand-green); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .full-width { grid-column: span 2; }
        label { font-size: 10px; font-weight: bold; color: #7f8c8d; text-transform: uppercase; }
        input, select { padding: 10px; border: 1px solid #ddd; border-radius: 6px; width: 100%; font-size: 14px; box-sizing: border-box; background: #fff; }
        
        .sig-container { margin: 10px 0; background: #f9f9f9; border: 1px dashed #ccc; border-radius: 8px; height: 100px; position: relative; }
        canvas { width: 100%; height: 100%; touch-action: none; }
        
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        button { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; font-size: 13px; }
        .btn-save { background: var(--brand-green); }
        .btn-pdf { background: var(--brand-blue); }
        .btn-back { background: var(--dark); }
        .btn-clear { background: #95a5a6; padding: 5px 10px; width: auto; font-size: 10px; margin-top: 5px; }

        /* Vorschau Tabelle (Preview Table) */
        .preview-card { width: 100%; max-width: 500px; background: white; padding: 10px; border-radius: 12px; overflow-x: auto; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .preview-table { width: 100%; border-collapse: collapse; font-size: 11px; min-width: 400px; }
        .preview-table th, .preview-table td { padding: 8px; border-bottom: 1px solid #eee; text-align: center; }
        .preview-table th { background: #f8f9fa; color: #888; }

        /* PDF Styles (Hidden) */
        #pdf-content { width: 210mm; padding: 15mm; background: white; color: black; position: absolute; left: -9999px; }
        .pdf-header { border-bottom: 2px solid black; margin-bottom: 15px; padding-bottom: 5px; }
        .pdf-table { width: 100%; border-collapse: collapse; }
        .pdf-table th, .pdf-table td { border: 1px solid black; padding: 4px; text-align: center; font-size: 11px; }
        .pdf-summary { margin-top: 20px; font-size: 12px; line-height: 1.8; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="color:var(--brand-green); margin:0 0 10px 0; text-align:center; font-size: 18px;">AC ELEKTRO</h2>
    
    <div class="grid">
        <div class="full-width">
            <label>Name, Vorname</label>
            <input type="text" id="name" placeholder="Max Mustermann">
        </div>
        <div>
            <label>Monat / Jahr</label>
            <input type="month" id="month" onchange="updateUI()">
        </div>
        <div>
            <label>Tag</label>
            <input type="number" id="day" min="1" max="31">
        </div>
        <div><label>Beginn</label><input type="time" id="start" value="07:00"></div>
        <div><label>Ende</label><input type="time" id="end" value="16:00"></div>
        <div><label>Pause (Min)</label><input type="number" id="pause" value="45"></div>
        <div>
            <label>Kategorie</label>
            <select id="type">
                <option value="work">Arbeit</option>
                <option value="urlaub">Urlaub</option>
                <option value="feiertag">Feiertag</option>
                <option value="krank">Krank</option>
            </select>
        </div>
        <div class="full-width">
            <label>Einsatzort / Projekt</label>
            <input type="text" id="city" placeholder="Baustelle / Ort">
        </div>
    </div>

    <div class="sig-container"><canvas id="canvas"></canvas></div>
    <button class="btn-clear" onclick="pad.clear()">Löschen (Signature)</button>

    <div class="btn-group">
        <button class="btn-save" onclick="saveData()">Speichern</button>
        <button class="btn-pdf" onclick="generatePDF()">PDF Erstellen</button>
        <button class="btn-back" onclick="exportJSON()">Backup</button>
        <button class="btn-back" style="background:#1abc9c" onclick="document.getElementById('fileIn').click()">Restore</button>
        <input type="file" id="fileIn" style="display:none" onchange="importJSON(event)">
    </div>
</div>

<div class="preview-card">
    <h4 style="margin:5px; font-size:12px; color:var(--dark);">Einträge für diesen Monat:</h4>
    <table class="preview-table">
        <thead>
            <tr><th>Tag</th><th>Zeit</th><th>Netto</th><th>Ort</th></tr>
        </thead>
        <tbody id="preview-body"></tbody>
    </table>
</div>

<div id="pdf-content">
    <div class="pdf-header"><h1 style="margin:0; font-size:22px;">Stundennachweis</h1></div>
    <p>Name: <span id="out-name" style="font-weight:bold; border-bottom:1px solid #000; min-width:200px; display:inline-block;"></span> 
       | Monat: <span id="out-month" style="font-weight:bold; border-bottom:1px solid #000; min-width:100px; display:inline-block;"></span></p>
    
    <table class="pdf-table">
        <thead>
            <tr><th>Tag</th><th>Beginn</th><th>Ende</th><th>Pause</th><th>Arbeitsstd.</th><th>Überstd.</th><th>Ort</th></tr>
        </thead>
        <tbody id="pdf-body"></tbody>
    </table>

    <div style="display:flex; justify-content:space-between; margin-top:20px;">
        <div class="pdf-summary">
            Gesamt Arbeitsstunden: <span id="sum-work" style="font-weight:bold;"></span> h<br>
            Gesamt Überstunden: <span id="sum-ot" style="font-weight:bold; color:red;"></span> h
        </div>
        <div style="text-align:center; border-top:1px solid black; width:200px; margin-top:40px;">
            <img id="pdf-sig" style="max-height:50px;"><br>Unterschrift
        </div>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('ace_v34_db')) || {};
    const canvas = document.getElementById("canvas");
    const pad = new SignaturePad(canvas);

    window.onload = () => {
        const now = new Date();
        document.getElementById('month').value = now.toISOString().substring(0, 7);
        document.getElementById('day').value = now.getDate();
        updateUI();
        resizeCanvas();
    };

    function resizeCanvas() {
        const ratio = Math.max(window.devicePixelRatio || 1, 1);
        canvas.width = canvas.offsetWidth * ratio;
        canvas.height = canvas.offsetHeight * ratio;
        canvas.getContext("2d").scale(ratio, ratio);
    }

    function updateUI() {
        const m = document.getElementById('month').value;
        const body = document.getElementById('preview-body');
        body.innerHTML = "";
        
        Object.keys(db).filter(k => k.startsWith(m)).sort().forEach(k => {
            const d = k.split('-')[2];
            const row = db[k];
            body.innerHTML += `<tr><td>${d}</td><td>${row.s}-${row.e}</td><td>${(row.m/60).toFixed(2)}h</td><td>${row.c}</td></tr>`;
        });
    }

    function saveData() {
        const m = document.getElementById('month').value, d = document.getElementById('day').value;
        const sT = document.getElementById('start').value, eT = document.getElementById('end').value;
        const pM = parseInt(document.getElementById('pause').value) || 0;
        const type = document.getElementById('type').value, city = document.getElementById('city').value;

        if(!m || !d || !city) return alert("Fehler: Bitte Einsatzort und Datum ausfüllen!");

        const [sh, sm] = sT.split(':').map(Number), [eh, em] = eT.split(':').map(Number);
        const diff = (eh * 60 + em) - (sh * 60 + sm);
        let net = diff - pM, ot = 0;

        const dayOfWeek = new Date(`${m}-${d}`).getDay();
        if(type === 'work') {
            if(dayOfWeek === 5) { if(diff > 300) ot = diff - 300; } 
            else { if(net > 510) ot = net - 510; }
        }

        db[`${m}-${d}`] = { s:sT, e:eT, p:pM, m:net, ot, c:city, t:type };
        localStorage.setItem('ace_v34_db', JSON.stringify(db));
        updateUI();
        alert("Gespeichert!");
    }

    function generatePDF() {
        if(pad.isEmpty()) return alert("Unterschrift fehlt!");
        const m = document.getElementById('month').value;
        document.getElementById('out-name').innerText = document.getElementById('name').value || "---";
        document.getElementById('out-month').innerText = m;
        
        const body = document.getElementById('pdf-body');
        body.innerHTML = "";
        let sWork = 0, sOT = 0;
        const days = new Date(m.split('-')[0], m.split('-')[1], 0).getDate();

        for(let i=1; i<=31; i++) {
            const row = (i <= days) ? (db[`${m}-${i}`] || {}) : null;
            if(row) {
                body.innerHTML += `<tr><td>${i}</td><td>${row.s||''}</td><td>${row.e||''}</td><td>${row.p||''}</td><td>${row.m?(row.m/60).toFixed(2):''}</td><td>${row.ot?(row.ot/60).toFixed(2):''}</td><td>${row.c||''}</td></tr>`;
                sWork += (row.m || 0); sOT += (row.ot || 0);
            } else {
                body.innerHTML += `<tr><td>${i}</td><td></td><td></td><td></td><td></td><td></td><td></td></tr>`;
            }
        }
        document.getElementById('sum-work').innerText = (sWork/60).toFixed(2);
        document.getElementById('sum-ot').innerText = (sOT/60).toFixed(2);
        document.getElementById('pdf-sig').src = pad.toDataURL();

        const opt = { margin: 10, filename: `Stundennachweis_${m}.pdf`, html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } };
        html2pdf().set(opt).from(document.getElementById('pdf-content')).save();
    }

    function exportJSON() {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([JSON.stringify(db)], {type: "application/json"}));
        a.download = `AC_Backup_${new Date().toISOString().slice(0,10)}.json`;
        a.click();
    }

    function importJSON(e) {
        const reader = new FileReader();
        reader.onload = (ev) => { db = JSON.parse(ev.target.result); localStorage.setItem('ace_v34_db', JSON.stringify(db)); updateUI(); alert("Geladen!"); };
        reader.readAsText(e.target.files[0]);
    }
</script>
</body>
</html>
